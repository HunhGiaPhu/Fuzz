<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DaFuzz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #080810;
    --text: #f0f0f5;
    --muted: #a0a0b0;
    --card: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.10);
    --accent: #b48cff;
    --accent2: #ff8cca;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    overflow-x: hidden;
  }

  #bg-image {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  #bg-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1;
    pointer-events: none;
  }
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 16px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
  }
  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    overflow: hidden;
    background: #222;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4ade80;
    border: 3px solid var(--bg);
  }

  .username {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .badge-pro { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #1a1a1a; }
  .badge-dev { background: rgba(255,255,255,0.12); color: var(--text); border: 1px solid var(--card-border); }
  .badge-new { background: rgba(255,140,202,0.15); color: var(--accent2); border: 1px solid rgba(255,140,202,0.3); }

  .bio {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }

  .stats {
    display: flex;
    gap: 24px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-num { font-size: 17px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .section-label {
    align-self: flex-start;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 10px 0 -8px 4px;
  }

  .music-card {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px;
    backdrop-filter: blur(10px);
  }
  .music-cover {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .music-text { flex: 1; min-width: 0; }
  .music-title { font-weight: 700; font-size: 14px; }
  .music-artist { color: var(--muted); font-size: 12px; }
  .music-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; }
  .music-bars span {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bar 1s ease-in-out infinite;
  }
  .music-bars span:nth-child(1) { height: 40%; animation-delay: 0s; }
  .music-bars span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
  .music-bars span:nth-child(3) { height: 60%; animation-delay: 0.4s; }
  @keyframes bar { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

  .link-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(10px);
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .link-item:hover {
    background: rgba(255,255,255,0.10);
    transform: translateY(-1px);
  }
  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .link-icon svg { width: 20px; height: 20px; }
  .ic-github { background: rgba(240,246,252,0.10); color: #e8e8e8; }
  .ic-discord { background: rgba(88,101,242,0.15); color: #8b95ff; }
  .ic-tiktok { background: rgba(255,255,255,0.10); color: #fff; }
  .ic-instagram { background: rgba(240,148,51,0.15); color: #f09433; }
  .ic-youtube { background: rgba(255,0,0,0.12); color: #ff4d4d; }
  .ic-steam { background: rgba(102,192,244,0.12); color: #66c0f4; }
  .ic-locket { background: rgba(255,182,193,0.15); }
  .ic-locket img { width: 22px; height: 22px; border-radius: 4px; }

  .link-text { flex: 1; min-width: 0; }
  .link-name { font-weight: 700; font-size: 14px; }
  .link-desc { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-arrow { color: var(--muted); font-size: 16px; }

  .music-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .music-toggle:hover { background: rgba(255,255,255,0.14); transform: scale(1.06); }
  .music-toggle svg { width: 20px; height: 20px; color: var(--text); }

  .volume-panel {
    position: fixed;
    bottom: 20px;
    right: 76px;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transform: translateX(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .volume-panel.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .volume-panel input[type="range"] {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    outline: none;
    cursor: pointer;
  }
  .volume-panel input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .volume-panel input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  .bio::after {
    content: '';
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.9s step-end infinite;
  }
  .bio.done::after { display: none; }
  @keyframes blink { 50% { opacity: 0; } }

  .quote-box {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    text-align: center;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.6;
  }
  .quote-mark {
    color: var(--accent);
    font-weight: 700;
    font-style: normal;
  }

  .copy-toast {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  .copy-toast.show { opacity: 1; transform: translateY(0); }

  #yt-player-wrap {
    position: fixed;
    width: 1px;
    height: 1px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<script>
(function() {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);

  function mkParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.5 + 0.2
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 60 }, mkParticle);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function(p) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(280,80%,75%,' + p.alpha + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  init();
  draw();
})();
</script>

<script>
(function() {
  var ytPlayer, isReady = false, userWantsPlay = true;
  var toggleBtn = document.getElementById('music-toggle');
  var iconOn = document.getElementById('music-icon-on');
  var iconOff = document.getElementById('music-icon-off');
  var volumePanel = document.getElementById('volume-panel');
  var volumeSlider = document.getElementById('volume-slider');

  function updateIcon(playing) {
    iconOn.style.display = playing ? 'block' : 'none';
    iconOff.style.display = playing ? 'none' : 'block';
  }
  updateIcon(false);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      height: '1',
      width: '1',
      videoId: 'YqlLjeM0l_4',
      playerVars: { autoplay: 1, controls: 0, loop: 1, playlist: 'YqlLjeM0l_4' },
      events: {
        onReady: function(e) {
          isReady = true;
          e.target.setVolume(Number(volumeSlider.value));
          e.target.playVideo();
        },
        onStateChange: function(e) {
          updateIcon(e.data === YT.PlayerState.PLAYING);
        }
      }
    });
  };

  // Fallback: browsers often block autoplay with sound until first interaction
  function tryPlayOnInteraction() {
    if (isReady && userWantsPlay) {
      ytPlayer.playVideo();
    }
    document.removeEventListener('click', tryPlayOnInteraction);
    document.removeEventListener('touchstart', tryPlayOnInteraction);
  }
  document.addEventListener('click', tryPlayOnInteraction);
  document.addEventListener('touchstart', tryPlayOnInteraction);

  toggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!isReady) return;
    var state = ytPlayer.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      ytPlayer.pauseVideo();
      userWantsPlay = false;
    } else {
      ytPlayer.playVideo();
      userWantsPlay = true;
    }
  });

  // Show volume panel on hover / tap of the music button
  toggleBtn.addEventListener('mouseenter', function() { volumePanel.classList.add('show'); });
  toggleBtn.addEventListener('mouseleave', function() {
    setTimeout(function() {
      if (!volumePanel.matches(':hover')) volumePanel.classList.remove('show');
    }, 150);
  });
  volumePanel.addEventListener('mouseleave', function() { volumePanel.classList.remove('show'); });

  volumeSlider.addEventListener('input', function(e) {
    e.stopPropagation();
    var vol = Number(volumeSlider.value);
    if (isReady) ytPlayer.setVolume(vol);
  });
  volumeSlider.addEventListener('click', function(e) { e.stopPropagation(); });
})();
</script>

<script>

    if (i <= bioText.length) {
      bioEl.textContent = bioText.slice(0, i);

      setTimeout(typeBio, 90);
    } else {
      bioEl.classList.add('done');
    }
  }
  typeBio();
})();

(function() {
  // Copy Discord username to clipboard
  var discordBtn = document.getElementById('discord-copy');
  var toast = document.getElementById('copy-toast');
  var discordUsername = 'hynhgafuz';
  var toastTimer;

  discordBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(discordUsername).then(function() {
      showToast();
    }).catch(function() {
      // Fallback for older browsers
      var temp = document.createElement('textarea');
      temp.value = discordUsername;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      showToast();
    });
  });

  function showToast() {
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove('show');
    }, 1800);
  }
})();
